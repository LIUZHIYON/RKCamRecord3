<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RKCamRecord3 — 摄像头录制控制</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- 顶部导航 -->
    <header>
        <div class="logo">
            <span class="logo-icon">🎥</span>
            <div class="logo-text">
                <h1>RKCamRecord3</h1>
                <span class="logo-sub">摄像头录制控制面板</span>
            </div>
        </div>
        <div class="header-status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">连接中...</span>
            <span class="board-ip">{{ board_ip }}</span>
        </div>
    </header>

    <div class="container">
        <!-- 主区域: 视频 + 控制 -->
        <div class="main-section">
            <div class="video-card">
                <div class="video-header">
                    <h2>📹 实时预览</h2>
                    <div class="record-indicator" id="recordIndicator">● 录制中</div>
                    <div class="timer" id="timer">00:00</div>
                </div>
                <div class="video-wrapper">
                    <img id="videoFeed" src="/stream" alt="视频流">
                    <div class="overlay-rec" id="overlayRec">● REC</div>
                </div>
            </div>

            <div class="control-card">
                <div class="control-header">
                    <h2>🎮 录制控制</h2>
                </div>

                <!-- 文件名输入 -->
                <div class="control-group">
                    <label for="filenameInput">录制文件名</label>
                    <div class="input-row">
                        <input type="text" id="filenameInput" placeholder="留空自动命名" spellcheck="false">
                        <button class="btn btn-sm btn-secondary" onclick="generateDefaultName()">🔄 自动</button>
                    </div>
                </div>

                <!-- 控制按钮 -->
                <div class="control-group">
                    <label>操作</label>
                    <div class="btn-row">
                        <button class="btn btn-record" id="recordBtn" onclick="startRecording()">
                            <span>●</span> 开始录制
                        </button>
                        <button class="btn btn-pause" id="pauseBtn" onclick="togglePause()" disabled>
                            ⏸ 暂停
                        </button>
                        <button class="btn btn-stop" id="stopBtn" onclick="stopRecording()" disabled>
                            ■ 停止
                        </button>
                    </div>
                </div>

                <!-- 状态信息 -->
                <div class="control-group">
                    <div class="stats-row">
                        <div class="stat-item">
                            <span class="stat-label">状态</span>
                            <span class="stat-value" id="stateText">空闲</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">帧数</span>
                            <span class="stat-value" id="frameCount">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">分辨率</span>
                            <span class="stat-value" id="resolutionText">--</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 录制文件列表 -->
        <div class="recordings-section">
            <div class="section-header">
                <h2>📂 录制文件</h2>
                <button class="btn btn-sm btn-secondary" onclick="refreshRecordings()">🔄 刷新</button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th class="col-name">文件名</th>
                            <th class="col-size">大小</th>
                            <th class="col-duration">时长</th>
                            <th class="col-fps">FPS</th>
                            <th class="col-resolution">分辨率</th>
                            <th class="col-date">创建时间</th>
                            <th class="col-actions">操作</th>
                        </tr>
                    </thead>
                    <tbody id="recordingsTable">
                        <tr><td colspan="7" class="empty-msg">暂无录制文件</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 重命名弹窗 -->
    <div class="modal-overlay" id="renameModal">
        <div class="modal">
            <div class="modal-header">
                <h3>✏️ 重命名文件</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <label for="renameInput">新文件名</label>
                <input type="text" id="renameInput" spellcheck="false">
                <p class="hint">扩展名 .mp4 会自动添加</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="confirmRename()">确认重命名</button>
            </div>
        </div>
    </div>

    <!-- Toast 通知 -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ── 状态 ────────────────────────────────────────
        let recordingActive = false;
        let paused = false;
        let timerInterval = null;
        let seconds = 0;
        let renameTarget = "";

        // ── 设备状态检测 ────────────────────────────────
        async function checkStatus() {
            try {
                const r = await fetch("/status");
                const data = await r.json();
                const dot = document.getElementById("statusDot");
                const text = document.getElementById("statusText");
                const resText = document.getElementById("resolutionText");

                if (data.online) {
                    dot.className = "status-dot online";
                    text.textContent = "板子在线 · 摄像头就绪";
                    if (data.board && data.board.resolution) {
                        resText.textContent = data.board.resolution;
                    }
                } else {
                    dot.className = "status-dot offline";
                    text.textContent = "板子离线";
                }
            } catch {
                document.getElementById("statusDot").className = "status-dot offline";
                document.getElementById("statusText").textContent = "无法连接板子";
            }
        }

        // ── 录制控制 ────────────────────────────────────
        async function startRecording() {
            const filename = document.getElementById("filenameInput").value.trim() || "";
            const r = await fetch("/record/start", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ filename }),
            });
            const data = await r.json();
            if (data.status === "started") {
                recordingActive = true;
                paused = false;
                seconds = 0;
                updateUI();
                startTimer();
                showToast("✅ 开始录制", "success");
            } else {
                showToast("❌ " + (data.error || "启动失败"), "error");
            }
        }

        async function togglePause() {
            const r = await fetch("/record/pause", { method: "POST" });
            const data = await r.json();
            paused = data.paused;
            updateUI();
            showToast(paused ? "⏸ 已暂停录制" : "▶️ 已恢复录制", "info");
        }

        async function stopRecording() {
            const r = await fetch("/record/stop", { method: "POST" });
            const data = await r.json();
            if (data.status === "saved") {
                showToast(`✅ 录制完成: ${data.file} (${data.frames}帧, ${data.duration}秒)`, "success");
            } else {
                if (data.error) showToast("❌ " + data.error, "error");
            }
            recordingActive = false;
            paused = false;
            stopTimer();
            updateUI();
            refreshRecordings();
        }

        // ── 定时器 ──────────────────────────────────────
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!paused) {
                    seconds++;
                    document.getElementById("timer").textContent = formatTime(seconds);
                    document.getElementById("frameCount").textContent = "录制中...";
                }
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            document.getElementById("timer").textContent = "00:00";
            document.getElementById("frameCount").textContent = "0";
        }

        function formatTime(s) {
            const m = String(Math.floor(s / 60)).padStart(2, "0");
            const sec = String(s % 60).padStart(2, "0");
            return m + ":" + sec;
        }

        // ── UI 更新 ────────────────────────────────────
        function updateUI() {
            const recBtn = document.getElementById("recordBtn");
            const pauseBtn = document.getElementById("pauseBtn");
            const stopBtn = document.getElementById("stopBtn");
            const indicator = document.getElementById("recordIndicator");
            const overlay = document.getElementById("overlayRec");
            const stateText = document.getElementById("stateText");

            if (recordingActive) {
                recBtn.disabled = true;
                recBtn.innerHTML = '<span>●</span> 录制中';
                stopBtn.disabled = false;
                stopBtn.innerHTML = '■ 停止';
                indicator.style.display = "flex";
                overlay.style.display = "block";

                if (paused) {
                    pauseBtn.textContent = "▶️ 恢复";
                    pauseBtn.className = "btn btn-resume";
                    indicator.textContent = "● 已暂停";
                    indicator.style.background = "rgba(245,158,11,0.9)";
                    stateText.textContent = "已暂停";
                    overlay.textContent = "⏸ PAUSED";
                    overlay.style.background = "rgba(0,0,0,0.6)";
                } else {
                    pauseBtn.textContent = "⏸ 暂停";
                    pauseBtn.className = "btn btn-pause";
                    indicator.textContent = "● 录制中";
                    indicator.style.background = "rgba(239,68,68,0.9)";
                    stateText.textContent = "录制中";
                    overlay.textContent = "● REC";
                    overlay.style.background = "rgba(239,68,68,0.5)";
                }
                pauseBtn.disabled = false;
            } else {
                recBtn.disabled = false;
                recBtn.innerHTML = '<span>●</span> 开始录制';
                pauseBtn.disabled = true;
                pauseBtn.textContent = "⏸ 暂停";
                pauseBtn.className = "btn btn-pause";
                stopBtn.disabled = true;
                stopBtn.innerHTML = "■ 停止";
                indicator.style.display = "none";
                overlay.style.display = "none";
                stateText.textContent = "空闲";
            }
        }

        // ── 录制文件管理 ────────────────────────────────
        async function refreshRecordings() {
            try {
                const r = await fetch("/recordings");
                const files = await r.json();
                const tbody = document.getElementById("recordingsTable");

                if (files.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="empty-msg">暂无录制文件</td></tr>';
                    return;
                }

                tbody.innerHTML = files.map(f => `
                    <tr>
                        <td class="col-name" title="${f.name}">${f.name}</td>
                        <td class="col-size">${f.size} ${f.size_unit}</td>
                        <td class="col-duration">${f.duration}s</td>
                        <td class="col-fps">${f.fps}</td>
                        <td class="col-resolution">${f.resolution}</td>
                        <td class="col-date">${f.modified}</td>
                        <td class="col-actions">
                            <button class="btn-icon" title="下载" onclick="downloadFile('${f.name}')">⬇️</button>
                            <button class="btn-icon" title="重命名" onclick="openRename('${f.name}')">✏️</button>
                            <button class="btn-icon btn-icon-danger" title="删除" onclick="deleteFile('${f.name}')">🗑️</button>
                        </td>
                    </tr>
                `).join("");
            } catch (e) {
                console.error("刷新列表失败", e);
            }
        }

        async function downloadFile(name) {
            window.open("/recordings/download/" + encodeURIComponent(name), "_blank");
        }

        function openRename(name) {
            renameTarget = name;
            const stem = name.replace(/\.mp4$/, "");
            document.getElementById("renameInput").value = stem;
            document.getElementById("renameModal").style.display = "flex";
            setTimeout(() => document.getElementById("renameInput").select(), 100);
        }

        function closeModal() {
            document.getElementById("renameModal").style.display = "none";
        }

        async function confirmRename() {
            const newName = document.getElementById("renameInput").value.trim();
            if (!newName) {
                showToast("请输入文件名", "error");
                return;
            }
            const r = await fetch("/recordings/rename", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ old_name: renameTarget, new_name: newName }),
            });
            const data = await r.json();
            if (data.status === "renamed") {
                showToast(`✅ 已重命名为 ${data.file}`, "success");
                closeModal();
                refreshRecordings();
            } else {
                showToast("❌ " + (data.error || "重命名失败"), "error");
            }
        }

        async function deleteFile(name) {
            if (!confirm(`确定删除 "${name}"？`)) return;
            const r = await fetch("/recordings/delete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name }),
            });
            const data = await r.json();
            if (data.status === "deleted") {
                showToast(`🗑️ 已删除 ${name}`, "info");
                refreshRecordings();
            } else {
                showToast("❌ 删除失败", "error");
            }
        }

        function generateDefaultName() {
            const now = new Date();
            const pad = n => String(n).padStart(2, "0");
            const name = `录制_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
            document.getElementById("filenameInput").value = name;
        }

        // ── Toast 通知 ─────────────────────────────────
        function showToast(msg, type = "info") {
            const container = document.getElementById("toastContainer");
            const toast = document.createElement("div");
            toast.className = "toast toast-" + type;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = "0";
                toast.style.transform = "translateX(100%)";
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // ── 初始化 ──────────────────────────────────────
        checkStatus();
        setInterval(checkStatus, 10000);
        refreshRecordings();
        setInterval(refreshRecordings, 15000);
        generateDefaultName();

        // 点击弹窗外关闭
        document.getElementById("renameModal").addEventListener("click", function(e) {
            if (e.target === this) closeModal();
        });
        document.getElementById("renameInput").addEventListener("keydown", function(e) {
            if (e.key === "Enter") confirmRename();
            if (e.key === "Escape") closeModal();
        });
    </script>
</body>
</html>
